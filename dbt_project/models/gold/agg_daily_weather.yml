version: 2

models:

  - name: agg_daily_weather
    description: "Daily weather aggregation by province for reporting and dashboards"

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - location_id
            - observation_date

    columns:

      - name: location_id
        tests:
          - not_null

      - name: observation_date
        tests:
          - not_null

      - name: location_name
        tests:
          - not_null

      - name: region
        tests:
          - not_null

      - name: season
        tests:
          - accepted_values:
              values:
                - rainy
                - dry

      - name: observations
        tests:
          - dbt_utils.accepted_range:
              min_value: 1

      - name: avg_temperature_c

      - name: min_temperature_c

      - name: max_temperature_c

      - name: avg_humidity_pct
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100

      - name: total_precipitation_mm
        tests:
          - dbt_utils.accepted_range:
              min_value: 0