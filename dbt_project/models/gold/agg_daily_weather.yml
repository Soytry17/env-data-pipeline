# dbt_project/models/gold/agg_daily_weather.yml

version: 2

models:
  - name: agg_daily_weather
    description: >
      Daily aggregated weather stats per province — Gold layer.
      Powers BI dashboards and FastAPI REST endpoints.
      One row per province per day.

    columns:
      - name: location_id
        tests:
          - not_null

      - name: date
        tests:
          - not_null

      - name: location_name
        tests:
          - not_null

      - name: region
        tests:
          - not_null
          - accepted_values:
              values:
                - "Central"
                - "Northern"
                - "Highland"
                - "Coastal"
                - "Eastern"

      - name: avg_temp_c
        tests:
          - not_null

      - name: season
        tests:
          - accepted_values:
              values:
                - "rainy"
                - "dry"

      - name: day_classification
        tests:
          - accepted_values:
              values:
                - "Extreme Heat"
                - "Hot and Humid"
                - "Warm"
                - "Mild"
                - "Cool"

      - name: precipitation_category
        tests:
          - accepted_values:
              values:
                - "No rain"
                - "Light rain"
                - "Moderate rain"
                - "Heavy rain"
                - "Extreme rain"

      - name: wind_classification
        tests:
          - accepted_values:
              values:
                - "Calm"
                - "Breeze"
                - "Moderate wind"
                - "Strong wind"
                - "Storm"