version: 2

models:
  - name: stg_weather
    description: "Cleaned weather readings unpacked from JSONB — Silver layer"
    columns:
      - name: bronze_id
        tests:
          - not_null

      - name: location_id
        tests:
          - not_null

      - name: source_id
        tests:
          - not_null

      - name: observation_at
        tests:
          - not_null

      - name: location_name
        tests:
          - not_null

      - name: region
        tests:
          - not_null
          - accepted_values:
              values:
                - "Central"
                - "Northern"
                - "Highland"
                - "Coastal"
                - "Eastern"

      - name: temperature_c
        description: "Temperature in Celsius — null if missing from API"

      - name: humidity_pct
        description: "Relative humidity 0–100%"

      - name: season
        tests:
          - accepted_values:
              values:
                - "rainy"
                - "dry"

      - name: comfort_level
        tests:
          - accepted_values:
              values:
                - "Comfortable"
                - "Caution"
                - "Extreme Caution"
                - "Danger"
                - "Extreme Danger"
                - "Unknown"